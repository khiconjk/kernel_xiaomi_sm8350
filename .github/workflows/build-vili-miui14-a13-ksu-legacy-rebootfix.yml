name: Build Xiaomi 11T Pro vili MIUI 14 Android 13 Kernel + KernelSU-Next Legacy Manual Hook Reboot Patch

"on":
  workflow_dispatch:
    inputs:
      enable_kernelsu:
        description: Enable KernelSU-Next built-in driver. Keep true for this test build.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      ksu_ref:
        description: KernelSU-Next ref/tag/branch. Use legacy for this vili 5.4 manual-hook kernel.
        required: true
        default: legacy
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: vili-miui14-a13-kernel-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVICE: vili
  DEVICE_NAME: Xiaomi 11T Pro
  ROM_TARGET: MIUI 14 Android 13
  DEFCONFIG: kangaroox-vili_defconfig
  ENABLE_KERNELSU: ${{ github.event.inputs.enable_kernelsu || 'true' }}
  KSU_REF: ${{ github.event.inputs.ksu_ref || 'legacy' }}
  ARCH: arm64
  SUBARCH: arm64
  OUT_DIR: out
  ARTIFACT_DIR: artifact-vili-miui14-a13
  KERNEL_NAME: vili-miui14-a13-kangaroox-ksu-legacy-rebootfix
  KBUILD_BUILD_USER: github
  KBUILD_BUILD_HOST: actions

jobs:
  build:
    name: Build vili kernel and AnyKernel3 zip
    runs-on: ubuntu-22.04

    steps:
      - name: Initialize logs
        shell: bash
        run: |
          set -Eeuo pipefail
          : > setup.log
          : > build.log
          echo "===== INIT =====" | tee -a setup.log
          date -u | tee -a setup.log
          uname -a | tee -a setup.log
          echo "" | tee -a setup.log
          echo "===== DISK BEFORE =====" | tee -a setup.log
          df -h | tee -a setup.log

      - name: Free disk space
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "===== FREE DISK SPACE =====" | tee -a setup.log
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android/sdk || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo docker system prune -af || true
          echo "" | tee -a setup.log
          echo "===== DISK AFTER CLEAN =====" | tee -a setup.log
          df -h | tee -a setup.log

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          path: kernel

      - name: Install dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "===== INSTALL DEPENDENCIES =====" | tee -a setup.log
          sudo apt-get update 2>&1 | tee -a setup.log
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            ca-certificates \
            ccache \
            cpio \
            curl \
            dwarves \
            file \
            flex \
            git \
            kmod \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            lz4 \
            make \
            pahole \
            perl \
            python-is-python3 \
            python3 \
            python3-pip \
            rsync \
            unzip \
            xz-utils \
            zip \
            zstd \
            2>&1 | tee -a setup.log

      - name: Verify source tree
        shell: bash
        run: |
          set -Eeuo pipefail
          cd kernel
          echo "===== SOURCE INFO =====" | tee -a ../setup.log
          git remote -v | tee -a ../setup.log
          git rev-parse --short HEAD | tee -a ../setup.log
          git branch --show-current | tee -a ../setup.log || true
          echo "" | tee -a ../setup.log
          echo "===== REQUIRED FILES =====" | tee -a ../setup.log
          test -f Makefile
          test -f "arch/arm64/configs/${DEFCONFIG}"
          echo "OK: arch/arm64/configs/${DEFCONFIG}" | tee -a ../setup.log
          echo "" | tee -a ../setup.log
          echo "===== MAKEFILE VERSION =====" | tee -a ../setup.log
          grep -nE "^(VERSION|PATCHLEVEL|SUBLEVEL|EXTRAVERSION)[[:space:]]*=" Makefile | tee -a ../setup.log || true
          echo "" | tee -a ../setup.log
          echo "===== DEFCONFIG QUICK CHECK =====" | tee -a ../setup.log
          grep -nE "CONFIG_LOCALVERSION|CONFIG_MODULES|CONFIG_BUILD_ARM64_DT_OVERLAY|CONFIG_KSU|CONFIG_KERNELSU|CONFIG_SUSFS|CONFIG_LTO" "arch/arm64/configs/${DEFCONFIG}" | tee -a ../setup.log || true

      - name: Fix KernelSU references
        shell: bash
        run: |
          set -Eeuo pipefail
          cd kernel
          echo "===== FIX KERNELSU REFERENCES =====" | tee -a ../setup.log
          echo "ENABLE_KERNELSU=${ENABLE_KERNELSU}" | tee -a ../setup.log
          echo "KSU_REF=${KSU_REF}" | tee -a ../setup.log

          echo "" | tee -a ../setup.log
          echo "===== KERNELSU REFERENCES BEFORE =====" | tee -a ../setup.log
          grep -nE 'kernelsu|CONFIG_KSU|CONFIG_KERNELSU' drivers/Makefile drivers/Kconfig "arch/arm64/configs/${DEFCONFIG}" 2>/dev/null | tee -a ../setup.log || true

          if [ "${ENABLE_KERNELSU}" = "true" ]; then
            echo "KernelSU enabled: installing KernelSU-Next into drivers/kernelsu." | tee -a ../setup.log
            rm -rf KernelSU KernelSU-Next

            # Preferred path: official KernelSU-Next setup script. It creates drivers/kernelsu
            # as a symlink to KernelSU-Next/kernel and injects Makefile/Kconfig lines if needed.
            if curl -fsSL https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/legacy/kernel/setup.sh -o /tmp/ksu-setup.sh; then
              if [ -z "${KSU_REF}" ] || [ "${KSU_REF}" = "latest" ]; then
                sh /tmp/ksu-setup.sh 2>&1 | tee -a ../setup.log || true
              else
                sh /tmp/ksu-setup.sh "${KSU_REF}" 2>&1 | tee -a ../setup.log || true
              fi
            fi

            # Fallback: manual clone/symlink if setup.sh did not produce drivers/kernelsu/Makefile.
            if [ ! -f drivers/kernelsu/Makefile ]; then
              rm -rf drivers/kernelsu KernelSU-Next
              if [ -n "${KSU_REF}" ] && [ "${KSU_REF}" != "latest" ]; then
                git clone --depth=1 --branch "${KSU_REF}" https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next 2>&1 | tee -a ../setup.log \
                  || git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next 2>&1 | tee -a ../setup.log
              else
                git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next 2>&1 | tee -a ../setup.log
              fi
              ln -s ../KernelSU-Next/kernel drivers/kernelsu
            fi

            if [ ! -f drivers/kernelsu/Makefile ]; then
              echo "ERROR: drivers/kernelsu/Makefile still missing after KernelSU setup" | tee -a ../setup.log
              find drivers -maxdepth 2 \( -type d -o -type l \) \( -name '*kernel*' -o -name '*su*' \) | tee -a ../setup.log || true
              exit 1
            fi

            grep -q 'kernelsu' drivers/Makefile || printf '%s\n' 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
            grep -q 'source "drivers/kernelsu/Kconfig"' drivers/Kconfig || sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig

            # This vili kernel tree already contains manual KernelSU hooks in fs/*.c.
            # Use KernelSU-Next manual hook mode. Do NOT force KPROBES hook here.
            if ! grep -q 'config KSU_MANUAL_HOOK' drivers/kernelsu/Kconfig; then
              echo "ERROR: selected KernelSU-Next ref does not provide KSU_MANUAL_HOOK." | tee -a ../setup.log
              echo "Use ksu_ref=legacy for this vili Android 11/5.4 manual-hook kernel." | tee -a ../setup.log
              echo "===== drivers/kernelsu/Kconfig =====" | tee -a ../setup.log
              sed -n '1,260p' drivers/kernelsu/Kconfig | tee -a ../setup.log || true
              exit 1
            fi

            echo "===== PATCH KERNELSU LEGACY MANUAL HOOK MARKER =====" | tee -a ../setup.log
            # KernelSU-Next legacy Kbuild validates manual-hook integration by
            # grepping kernel/reboot.c for ksu_handle_sys_reboot. This source
            # already has the fs hooks, but reboot.c is missing, so Kbuild stops
            # with: No hooks were defined. Patch reboot.c idempotently here.
            python3 - <<'PY_KSU_REBOOT_PATCH' 2>&1 | tee -a ../setup.log
          from pathlib import Path

          p = Path('kernel/reboot.c')
          s = p.read_text()
          orig = s

          extern_block = """#ifdef CONFIG_KSU
          extern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd,
                                           void __user **arg);
          #endif

          """

          if 'ksu_handle_sys_reboot' not in s:
              marker_candidates = [
                  "SYSCALL_DEFINE4(reboot, int, magic1, int, magic2, unsigned int, cmd,\n\t\tvoid __user *, arg)",
                  "SYSCALL_DEFINE4(reboot, int, magic1, int, magic2, unsigned int, cmd, void __user *, arg)",
              ]
              marker = next((m for m in marker_candidates if m in s), None)
              if marker is None:
                  raise SystemExit('ERROR: cannot find SYSCALL_DEFINE4(reboot...) in kernel/reboot.c')

              s = s.replace(marker, extern_block + marker, 1)

              variable_candidates = [
                  "\tstruct pid_namespace *pid_ns = task_active_pid_ns(current);\n\tchar buffer[256];\n\tint ret = 0;\n",
                  " struct pid_namespace *pid_ns = task_active_pid_ns(current); char buffer[256]; int ret = 0; ",
              ]
              old = next((v for v in variable_candidates if v in s), None)
              if old is None:
                  raise SystemExit('ERROR: cannot find local variable block in kernel/reboot.c')

              if '\n' in old:
                  new = old + "\n#ifdef CONFIG_KSU\n\tksu_handle_sys_reboot(magic1, magic2, cmd, &arg);\n#endif\n"
              else:
                  new = old + "\n#ifdef CONFIG_KSU\n\tksu_handle_sys_reboot(magic1, magic2, cmd, &arg);\n#endif\n"
              s = s.replace(old, new, 1)

          if s != orig:
              p.write_text(s)
              print('Patched kernel/reboot.c with ksu_handle_sys_reboot manual hook marker.')
          else:
              print('kernel/reboot.c already has ksu_handle_sys_reboot.')

          print('===== KSU HOOK MARKER CHECK =====')
          for path, token in [
              ('fs/exec.c', 'ksu_handle_execveat'),
              ('fs/open.c', 'ksu_handle_faccessat'),
              ('fs/read_write.c', 'ksu_handle_'),
              ('fs/stat.c', 'ksu_handle_stat'),
              ('kernel/reboot.c', 'ksu_handle_sys_reboot'),
          ]:
              data = Path(path).read_text(errors='ignore')
              print(('OK' if token in data else 'MISSING') + ': ' + path + ' contains ' + token)
          PY_KSU_REBOOT_PATCH

            if ! grep -q 'ksu_handle_sys_reboot' kernel/reboot.c; then
              echo "ERROR: kernel/reboot.c still lacks ksu_handle_sys_reboot after patch" | tee -a ../setup.log
              exit 1
            fi

            sed -i '/CONFIG_KSU/d;/CONFIG_KERNELSU/d' "arch/arm64/configs/${DEFCONFIG}" 2>/dev/null || true
            printf '%s\n' \
              'CONFIG_KSU=y' \
              'CONFIG_KSU_MANUAL_HOOK=y' \
              '# CONFIG_KSU_KPROBES_HOOK is not set' \
              '# CONFIG_KSU_DEBUG is not set' \
              >> "arch/arm64/configs/${DEFCONFIG}"
          else
            echo "KernelSU disabled: removing stale kernelsu Kbuild/Kconfig/defconfig references." | tee -a ../setup.log
            rm -rf drivers/kernelsu KernelSU KernelSU-Next || true
            sed -i '/kernelsu/d;/KernelSU/d' drivers/Makefile drivers/Kconfig 2>/dev/null || true
            sed -i '/CONFIG_KSU/d;/CONFIG_KERNELSU/d' "arch/arm64/configs/${DEFCONFIG}" 2>/dev/null || true

            # This tree already has manual KernelSU hooks inside fs/*.c.
            # Removing drivers/kernelsu alone leaves unresolved symbols such as
            # ksu_handle_faccessat/ksu_handle_vfs_read/ksu_handle_stat/ksu_handle_execveat.
            # Add no-op stubs only for the stock-like non-KSU build so the hooks do nothing.
            cat > kernel/ksu_disabled_stub.c <<'EOF_KSU_STUB'
          #include <linux/types.h>
          #include <linux/fs.h>
          #include <linux/compiler_types.h>
          
          struct filename;
          
          int ksu_handle_faccessat(int *dfd, const char __user **filename_user,
                                   int *mode, int *flags)
          {
                  return 0;
          }
          
          int ksu_handle_vfs_read(struct file **file_ptr, char __user **buf_ptr,
                                  size_t *count_ptr, loff_t **pos)
          {
                  return 0;
          }
          
          int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags)
          {
                  return 0;
          }
          
          int ksu_handle_execveat(int *fd, struct filename **filename_ptr,
                                  void *argv, void *envp, int *flags)
          {
                  return 0;
          }
          EOF_KSU_STUB
            grep -q '^obj-y += ksu_disabled_stub.o' kernel/Makefile || printf '%s\n' 'obj-y += ksu_disabled_stub.o' >> kernel/Makefile
            echo "Added non-KSU no-op stubs for leftover manual KernelSU hooks." | tee -a ../setup.log
          fi

          echo "" | tee -a ../setup.log
          echo "===== KERNELSU REFERENCES AFTER =====" | tee -a ../setup.log
          grep -nE 'kernelsu|CONFIG_KSU|CONFIG_KERNELSU' drivers/Makefile drivers/Kconfig "arch/arm64/configs/${DEFCONFIG}" 2>/dev/null | tee -a ../setup.log || true
      - name: Cache WeebX Clang
        uses: actions/cache@v4
        with:
          path: ~/.cache/weebx-clang
          key: weebx-clang-${{ runner.os }}-v2

      - name: Setup WeebX Clang
        shell: bash
        run: |
          set -Eeuo pipefail
          CLANG_DIR="$HOME/.cache/weebx-clang/clang"
          TMP_DIR="$RUNNER_TEMP/weebx-clang"
          mkdir -p "$CLANG_DIR" "$TMP_DIR"

          echo "===== WEEBX CLANG SETUP =====" | tee -a setup.log
          echo "Toolchain cache dir: $CLANG_DIR" | tee -a setup.log

          if [ ! -x "$CLANG_DIR/bin/clang" ]; then
            rm -rf "$CLANG_DIR" "$TMP_DIR"
            mkdir -p "$CLANG_DIR" "$TMP_DIR/extract"

            CLANG_URL="$(curl -fsSL https://raw.githubusercontent.com/XSans0/WeebX-Clang/main/main/link.txt | tr -d '\r\n')"
            if [ -z "$CLANG_URL" ]; then
              echo "ERROR: empty WeebX Clang URL" | tee -a setup.log
              exit 1
            fi

            echo "Downloading: $CLANG_URL" | tee -a setup.log
            curl -L --fail --retry 10 --retry-all-errors --retry-delay 5 "$CLANG_URL" -o "$TMP_DIR/clang.tar.gz" 2>&1 | tee -a setup.log
            tar -xf "$TMP_DIR/clang.tar.gz" -C "$TMP_DIR/extract" 2>&1 | tee -a setup.log

            # WeebX release may ship clang as bin/clang-20 instead of bin/clang.
            # Find either layout, then normalize the installed toolchain below.
            CLANG_BIN="$(find "$TMP_DIR/extract" -type f \( -path '*/bin/clang' -o -path '*/bin/clang-[0-9]*' \) -print | sort -V | tail -n 1 || true)"
            if [ -z "$CLANG_BIN" ]; then
              echo "ERROR: clang/clang-N binary not found inside archive" | tee -a setup.log
              echo "===== FIRST 250 FILES IN TOOLCHAIN ARCHIVE =====" | tee -a setup.log
              find "$TMP_DIR/extract" -maxdepth 4 -type f | head -250 | tee -a setup.log || true
              exit 1
            fi

            chmod +x "$CLANG_BIN" || true
            CLANG_ROOT="$(dirname "$(dirname "$CLANG_BIN")")"
            echo "Detected clang binary: $CLANG_BIN" | tee -a setup.log
            echo "Detected clang root: $CLANG_ROOT" | tee -a setup.log
            cp -a "$CLANG_ROOT"/. "$CLANG_DIR"/
          fi

          mkdir -p "$CLANG_DIR/bin"
          chmod -R u+rx "$CLANG_DIR/bin" || true

          cd "$CLANG_DIR/bin"

          # Normalize common binary names expected by Android kernel Makefiles.
          if [ ! -x clang ]; then
            CAND="$(find . -maxdepth 1 -type f -name 'clang-[0-9]*' -print | sort -V | tail -n 1 || true)"
            if [ -n "$CAND" ]; then
              ln -sf "${CAND#./}" clang
            fi
          fi

          if [ ! -x clang++ ]; then
            CXX_CAND="$(find . -maxdepth 1 -type f -name 'clang++-[0-9]*' -print | sort -V | tail -n 1 || true)"
            if [ -n "$CXX_CAND" ]; then
              ln -sf "${CXX_CAND#./}" clang++
            elif [ -x clang ]; then
              ln -sf clang clang++
            fi
          fi

          if [ ! -x ld.lld ] && [ -x lld ]; then
            ln -sf lld ld.lld
          fi

          # Some custom clang archives include GNU-style names but not every LLVM alias.
          [ ! -x llvm-strip   ] && [ -x strip   ] && ln -sf strip   llvm-strip   || true
          [ ! -x llvm-objcopy ] && [ -x objcopy ] && ln -sf objcopy llvm-objcopy || true
          [ ! -x llvm-objdump ] && [ -x objdump ] && ln -sf objdump llvm-objdump || true
          [ ! -x llvm-readelf ] && [ -x readelf ] && ln -sf readelf llvm-readelf || true
          [ ! -x llvm-ar      ] && [ -x ar      ] && ln -sf ar      llvm-ar      || true
          [ ! -x llvm-nm      ] && [ -x nm      ] && ln -sf nm      llvm-nm      || true

          if [ ! -x "$CLANG_DIR/bin/clang" ]; then
            echo "ERROR: clang still not executable after compatibility symlink setup" | tee -a ../../setup.log
            echo "===== TOOLCHAIN BIN DIR =====" | tee -a ../../setup.log
            ls -lah "$CLANG_DIR/bin" | tee -a ../../setup.log || true
            exit 1
          fi

          echo "$CLANG_DIR/bin" >> "$GITHUB_PATH"
          echo "CLANG_DIR=$CLANG_DIR" >> "$GITHUB_ENV"

          echo "" | tee -a ../../setup.log
          echo "===== CLANG VERSION =====" | tee -a ../../setup.log
          "$CLANG_DIR/bin/clang" --version | tee -a ../../setup.log
          echo "" | tee -a ../../setup.log
          echo "===== NORMALIZED TOOLCHAIN BINARIES =====" | tee -a ../../setup.log
          ls -lah "$CLANG_DIR/bin" | grep -E 'clang|lld|llvm-|aarch64|arm-linux' | head -250 | tee -a ../../setup.log || true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-vili-miui14-a13-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ccache-vili-miui14-a13-${{ github.ref_name }}-
            ccache-vili-miui14-a13-

      - name: Prepare defconfig
        shell: bash
        run: |
          set -Eeuo pipefail
          cd kernel
          export PATH="$CLANG_DIR/bin:$PATH"
          export CCACHE_DIR="$HOME/.ccache"
          export KBUILD_BUILD_USER="$KBUILD_BUILD_USER"
          export KBUILD_BUILD_HOST="$KBUILD_BUILD_HOST"
          ccache -M 5G || true
          ccache -z || true

          MAKE_ARGS=(
            O="$OUT_DIR"
            ARCH=arm64
            SUBARCH=arm64
            LLVM=1
            LLVM_IAS=1
            CC="ccache clang"
            HOSTCC="ccache clang"
            HOSTCXX="ccache clang++"
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            AR=llvm-ar
            NM=llvm-nm
            LD=ld.lld
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
          )

          echo "===== MAKE ${DEFCONFIG} =====" | tee -a ../build.log
          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR"
          make "${MAKE_ARGS[@]}" "$DEFCONFIG" 2>&1 | tee -a ../build.log
          test -f "$OUT_DIR/.config"

          echo "" | tee -a ../build.log
          echo "===== CONFIG AFTER DEFCONFIG =====" | tee -a ../build.log
          grep -nE "CONFIG_LOCALVERSION|CONFIG_MODULES|CONFIG_BUILD_ARM64_DT_OVERLAY|CONFIG_KSU|CONFIG_KERNELSU|CONFIG_SUSFS|CONFIG_LTO" "$OUT_DIR/.config" | tee -a ../build.log || true

          echo "" | tee -a ../build.log
          if [ "${ENABLE_KERNELSU}" = "true" ]; then
            echo "" | tee -a ../build.log
            echo "===== FORCE KERNELSU MANUAL-HOOK CONFIG BEFORE OLDDEFCONFIG =====" | tee -a ../build.log
            if [ -x scripts/config ]; then
              scripts/config --file "$OUT_DIR/.config" \
                -e KSU \
                -e KSU_MANUAL_HOOK \
                -d KSU_KPROBES_HOOK \
                -d KSU_DEBUG || true
            else
              sed -i '/CONFIG_KSU/d;/CONFIG_KERNELSU/d' "$OUT_DIR/.config" 2>/dev/null || true
              printf '%s\n' \
                'CONFIG_KSU=y' \
                'CONFIG_KSU_MANUAL_HOOK=y' \
                '# CONFIG_KSU_KPROBES_HOOK is not set' \
                '# CONFIG_KSU_DEBUG is not set' \
                >> "$OUT_DIR/.config"
            fi
            grep -nE "CONFIG_KSU|CONFIG_KERNELSU|CONFIG_KPROBES|CONFIG_KRETPROBES|CONFIG_HAVE_SYSCALL_TRACEPOINTS" "$OUT_DIR/.config" | tee -a ../build.log || true
          fi

          echo "===== OLDDEFCONFIG =====" | tee -a ../build.log
          make "${MAKE_ARGS[@]}" olddefconfig 2>&1 | tee -a ../build.log

          echo "" | tee -a ../build.log
          echo "===== CONFIG AFTER OLDDEFCONFIG =====" | tee -a ../build.log
          grep -nE "CONFIG_KSU|CONFIG_KERNELSU|CONFIG_KPROBES|CONFIG_KRETPROBES|CONFIG_HAVE_SYSCALL_TRACEPOINTS" "$OUT_DIR/.config" | tee -a ../build.log || true
          if [ "${ENABLE_KERNELSU}" = "true" ]; then
            if ! grep -q '^CONFIG_KSU=y' "$OUT_DIR/.config"; then
              echo "ERROR: CONFIG_KSU=y missing in final .config" | tee -a ../build.log
              echo "===== KernelSU Kconfig =====" | tee -a ../build.log
              sed -n '1,220p' drivers/kernelsu/Kconfig | tee -a ../build.log || true
              exit 1
            fi
            if ! grep -q '^CONFIG_KSU_MANUAL_HOOK=y' "$OUT_DIR/.config"; then
              echo "ERROR: CONFIG_KSU_MANUAL_HOOK=y missing in final .config" | tee -a ../build.log
              echo "This kernel already has manual KernelSU hooks, so KPROBES mode is not the target." | tee -a ../build.log
              echo "===== KernelSU Kconfig =====" | tee -a ../build.log
              sed -n '1,260p' drivers/kernelsu/Kconfig | tee -a ../build.log || true
              exit 1
            fi
          fi

      - name: Build kernel
        shell: bash
        run: |
          set -Eeuo pipefail
          cd kernel
          export PATH="$CLANG_DIR/bin:$PATH"
          export CCACHE_DIR="$HOME/.ccache"
          export KBUILD_BUILD_USER="$KBUILD_BUILD_USER"
          export KBUILD_BUILD_HOST="$KBUILD_BUILD_HOST"

          MAKE_ARGS=(
            O="$OUT_DIR"
            ARCH=arm64
            SUBARCH=arm64
            LLVM=1
            LLVM_IAS=1
            CC="ccache clang"
            HOSTCC="ccache clang"
            HOSTCXX="ccache clang++"
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            AR=llvm-ar
            NM=llvm-nm
            LD=ld.lld
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
          )

          JOBS="$(nproc --all)"
          echo "===== BUILD KERNEL IMAGE =====" | tee -a ../build.log
          echo "Jobs: $JOBS" | tee -a ../build.log
          make "${MAKE_ARGS[@]}" -j"$JOBS" Image.gz 2>&1 | tee -a ../build.log

          echo "" | tee -a ../build.log
          echo "===== BUILD MODULES OPTIONAL =====" | tee -a ../build.log
          if grep -q '^CONFIG_MODULES=y' "$OUT_DIR/.config"; then
            make "${MAKE_ARGS[@]}" -j"$JOBS" modules 2>&1 | tee -a ../build.log
          else
            echo "CONFIG_MODULES is not enabled in final .config; skipping make modules." | tee -a ../build.log
          fi

          echo "" | tee -a ../build.log
          echo "===== BUILD DTBS OPTIONAL =====" | tee -a ../build.log
          make "${MAKE_ARGS[@]}" -j"$JOBS" dtbs 2>&1 | tee -a ../build.log || true

          echo "" | tee -a ../build.log
          echo "===== BUILD DTBO.IMG OPTIONAL =====" | tee -a ../build.log
          make "${MAKE_ARGS[@]}" -j"$JOBS" dtbo.img 2>&1 | tee -a ../build.log || true

          echo "" | tee -a ../build.log
          echo "===== BUILD OUTPUT QUICK LIST =====" | tee -a ../build.log
          find "$OUT_DIR/arch/arm64/boot" -maxdepth 4 -type f \
            \( -name 'Image' -o -name 'Image.gz' -o -name 'Image.gz-dtb' -o -name '*.dtb' -o -name '*.dtbo' -o -name 'dtbo.img' \) \
            -printf '%p  %s bytes\n' | sort | tee -a ../build.log || true

          echo "" | tee -a ../build.log
          echo "===== CCACHE STATS =====" | tee -a ../build.log
          ccache -s | tee -a ../build.log || true

      - name: Collect outputs
        shell: bash
        run: |
          set -Eeuo pipefail
          cd kernel
          ARTIFACT_DIR="../${ARTIFACT_DIR}"
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR/kernel" "$ARTIFACT_DIR/dtb-output" "$ARTIFACT_DIR/modules" "$ARTIFACT_DIR/logs"

          echo "===== COLLECT OUTPUTS =====" | tee -a ../build.log
          BOOT_DIR="$OUT_DIR/arch/arm64/boot"

          if [ -f "$BOOT_DIR/Image.gz" ]; then
            cp -a "$BOOT_DIR/Image.gz" "$ARTIFACT_DIR/kernel/Image.gz"
          fi
          if [ -f "$BOOT_DIR/Image" ]; then
            cp -a "$BOOT_DIR/Image" "$ARTIFACT_DIR/kernel/Image"
          fi
          if [ -f "$BOOT_DIR/Image.gz-dtb" ]; then
            cp -a "$BOOT_DIR/Image.gz-dtb" "$ARTIFACT_DIR/kernel/Image.gz-dtb-inspection-only"
          fi

          find "$BOOT_DIR" -type f \( -name '*.dtb' -o -name '*.dtbo' -o -name 'dtbo.img' \) -exec cp -a {} "$ARTIFACT_DIR/dtb-output/" \; 2>/dev/null || true
          find "$OUT_DIR" -type f -name '*.ko' -exec cp -a {} "$ARTIFACT_DIR/modules/" \; 2>/dev/null || true

          cp -a ../setup.log "$ARTIFACT_DIR/logs/setup.log" || true
          cp -a ../build.log "$ARTIFACT_DIR/logs/build.log" || true
          cp -a "$OUT_DIR/.config" "$ARTIFACT_DIR/logs/final.config" || true
          cp -a "$OUT_DIR/System.map" "$ARTIFACT_DIR/logs/System.map" || true
          cp -a "$OUT_DIR/Module.symvers" "$ARTIFACT_DIR/logs/Module.symvers" || true

          echo "" | tee -a ../build.log
          echo "===== ARTIFACT TREE =====" | tee -a ../build.log
          find "$ARTIFACT_DIR" -maxdepth 3 -type f -printf '%p  %s bytes\n' | sort | tee -a ../build.log

          if [ ! -f "$ARTIFACT_DIR/kernel/Image.gz" ] && [ ! -f "$ARTIFACT_DIR/kernel/Image" ]; then
            echo "ERROR: no Image.gz/Image found. Kernel build is not usable." | tee -a ../build.log
            exit 1
          fi

      - name: Create AnyKernel3 flashable zip
        shell: bash
        run: |
          set -Eeuo pipefail
          ARTIFACT_DIR="${ARTIFACT_DIR}"
          AK3_DIR="AnyKernel3-vili"
          ZIP_NAME="${KERNEL_NAME}-AnyKernel3-${GITHUB_RUN_NUMBER}.zip"

          echo "===== CREATE ANYKERNEL3 ZIP =====" | tee -a build.log
          rm -rf "$AK3_DIR"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git "$AK3_DIR" 2>&1 | tee -a build.log
          rm -rf "$AK3_DIR/.git" "$AK3_DIR/.github" "$AK3_DIR/README.md" "$AK3_DIR/LICENSE" "$AK3_DIR/ramdisk" "$AK3_DIR/patch"

          cat > "$AK3_DIR/anykernel.sh" <<'EOF'
          # AnyKernel3 Ramdisk Mod Script
          # Flash target: Xiaomi 11T Pro / vili / MIUI 14 Android 13
          
          properties() { '
          kernel.string=KangarooX sm8350 vili MIUI 14 Android 13 KernelSU-Next Manual Hook
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=vili
          device.name2=Xiaomi 11T Pro
          device.name3=2107113SG
          device.name4=2107113SI
          device.name5=2107113SR
          supported.versions=13 - 13
          supported.patchlevels=
          '; }
          
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=auto;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          
          . tools/ak3-core.sh;
          
          dump_boot;
          write_boot;
          EOF

          if [ -f "$ARTIFACT_DIR/kernel/Image.gz" ]; then
            cp -a "$ARTIFACT_DIR/kernel/Image.gz" "$AK3_DIR/Image.gz"
          elif [ -f "$ARTIFACT_DIR/kernel/Image" ]; then
            cp -a "$ARTIFACT_DIR/kernel/Image" "$AK3_DIR/Image"
          elif [ -f "$ARTIFACT_DIR/kernel/Image.gz-dtb-inspection-only" ]; then
            echo "WARNING: Image.gz not found, using Image.gz-dtb fallback. For MIUI 14 A13, Image.gz is preferred." | tee -a build.log
            cp -a "$ARTIFACT_DIR/kernel/Image.gz-dtb-inspection-only" "$AK3_DIR/Image.gz-dtb"
          else
            echo "ERROR: no kernel image found for AnyKernel3" | tee -a build.log
            exit 1
          fi

          cat > "$ARTIFACT_DIR/README_FLASH.txt" <<EOF
          Xiaomi 11T Pro vili - MIUI 14 Android 13 - KernelSU-Next manual-hook test build
          
          Flash file:
            flashable/$ZIP_NAME
          
          Khuyến nghị:
            1. Backup boot.img gốc trước khi flash.
            2. Chỉ flash AnyKernel3 ZIP này vào boot partition.
            3. Sau khi boot, cài KernelSU Next Manager đúng bản mới nhất để kiểm tra trạng thái root.
            4. Không flash dtbo-output hoặc modules zip nếu chưa xác minh chúng khớp đúng ROM stock của máy.
            5. Nếu bootloop: restore boot.img gốc trong TWRP/OrangeFox hoặc fastboot flash boot boot.img.
          
          Artifact khác:
            kernel/Image.gz: kernel image chính.
            dtb-output/: chỉ để kiểm tra, không tự flash.
            modules/: chỉ để kiểm tra, không tự thay vendor_dlkm.
            logs/: setup.log, build.log, final.config.
          EOF

          mkdir -p "$ARTIFACT_DIR/flashable"
          (cd "$AK3_DIR" && zip -r9 "../$ZIP_NAME" . -x '*.git*' 2>&1 | tee -a ../build.log)
          mv "$ZIP_NAME" "$ARTIFACT_DIR/flashable/$ZIP_NAME"

          echo "" | tee -a build.log
          echo "===== FLASHABLE ZIP =====" | tee -a build.log
          ls -lh "$ARTIFACT_DIR/flashable" | tee -a build.log

      - name: Pack modules inspection zip
        shell: bash
        run: |
          set -Eeuo pipefail
          ARTIFACT_DIR="${ARTIFACT_DIR}"
          echo "===== PACK MODULES INSPECTION ZIP =====" | tee -a build.log
          if find "$ARTIFACT_DIR/modules" -type f -name '*.ko' | grep -q .; then
            (cd "$ARTIFACT_DIR/modules" && zip -r9 "../${KERNEL_NAME}-modules-inspection-only-${GITHUB_RUN_NUMBER}.zip" . 2>&1 | tee -a ../../build.log)
          else
            echo "No modules found." | tee -a build.log
          fi

      - name: Show real errors if failed
        if: failure()
        shell: bash
        run: |
          echo "===== SETUP ERROR LINES ====="
          if [ -f setup.log ]; then
            grep -nEi 'error:|fatal:|failed|no such file|not found|permission denied|cannot|undefined reference|ld\.lld|make(\[[0-9]+\])?: \*\*\*' setup.log | tail -200 || true
          else
            echo "setup.log missing"
          fi

          echo ""
          echo "===== BUILD ERROR LINES ====="
          if [ -f build.log ]; then
            grep -nEi 'error:|fatal:|failed|no such file|not found|permission denied|cannot|undefined reference|ld\.lld|make(\[[0-9]+\])?: \*\*\*' build.log | tail -300 || true
            echo ""
            echo "===== LAST 250 BUILD LINES ====="
            tail -250 build.log || true
          else
            echo "build.log missing"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vili-miui14-a13-ksu-kernel-${{ github.run_number }}
          path: |
            artifact-vili-miui14-a13/**
            setup.log
            build.log
          if-no-files-found: warn
          compression-level: 6
          retention-days: 14
