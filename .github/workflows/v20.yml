name: Build Xiaomi 11T Pro vili MIUI 14 Android 13 Kernel + KSU Legacy Manual Hook + SuSFS Level 4 SUS_MOUNT Debug V20 Marker Fix

"on":
  workflow_dispatch:
    inputs:
      enable_kernelsu:
        description: Enable KernelSU-Next built-in driver. Keep true for this test build.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      ksu_ref:
        description: KernelSU-Next ref/tag/branch. Use legacy for this vili 5.4 manual-hook kernel.
        required: true
        default: legacy
      enable_susfs:
        description: Level 4 SUS_MOUNT debug V20. Fixes conditional compat marker verification and keeps V19 newline fix.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      susfs_ref:
        description: susfs4ksu branch/ref. Use kernel-5.4 for this kernel.
        required: true
        default: kernel-5.4
      ksu_version_code:
        description: Force KernelSU-Next kernel version code for Manager compatibility.
        required: true
        default: "33129"
      kernel_build_timestamp:
        description: Fixed kernel build timestamp shown by uname. Use Dec 18 2023 to match MIUI 14 system build date.
        required: true
        default: "Mon Dec 18 00:00:00 UTC 2023"
      source_date_epoch:
        description: SOURCE_DATE_EPOCH for reproducible kernel build date. 1702857600 = 2023-12-18 00:00:00 UTC.
        required: true
        default: "1702857600"

permissions:
  contents: read

concurrency:
  group: vili-miui14-a13-kernel-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVICE: vili
  DEVICE_NAME: Xiaomi 11T Pro
  ROM_TARGET: MIUI 14 Android 13
  DEFCONFIG: kangaroox-vili_defconfig
  ENABLE_KERNELSU: ${{ github.event.inputs.enable_kernelsu || 'true' }}
  KSU_REF: ${{ github.event.inputs.ksu_ref || 'legacy' }}
  ENABLE_SUSFS: ${{ github.event.inputs.enable_susfs || 'true' }}
  SUSFS_REF: ${{ github.event.inputs.susfs_ref || 'kernel-5.4' }}
  KSU_VERSION_CODE: ${{ github.event.inputs.ksu_version_code || '33129' }}
  KERNEL_BUILD_TIMESTAMP: ${{ github.event.inputs.kernel_build_timestamp || 'Mon Dec 18 00:00:00 UTC 2023' }}
  KERNEL_SOURCE_DATE_EPOCH: ${{ github.event.inputs.source_date_epoch || '1702857600' }}
  ARCH: arm64
  SUBARCH: arm64
  OUT_DIR: out
  ARTIFACT_DIR: artifact-vili-miui14-a13
  KERNEL_NAME: vili-miui14-a13-kangaroox-ksu-legacy-manual-susfs-level4-susmount-debug-v20
  KBUILD_BUILD_USER: github
  KBUILD_BUILD_HOST: actions

jobs:
  build:
    name: Build vili kernel and AnyKernel3 zip
    runs-on: ubuntu-22.04

    steps:
      - name: Initialize logs
        shell: bash
        run: |
          set -Eeuo pipefail
          : > setup.log
          : > build.log
          echo "===== INIT =====" | tee -a setup.log
          echo "YAML_MARKER=LEVEL4_SUS_MOUNT_DEBUG_V20_CONDITIONAL_COMPAT_MARKER_FIX" | tee -a setup.log
          echo "LEVEL4_NOTE=V20 keeps SUS_MOUNT enabled, keeps V19 Kbuild newline fix, and fixes the namespace conditional compat verification marker. HIDE remains off and LOG is on." | tee -a setup.log
          date -u | tee -a setup.log
          echo "Kernel build timestamp forced to: ${KERNEL_BUILD_TIMESTAMP}" | tee -a setup.log
          echo "SOURCE_DATE_EPOCH forced to: ${KERNEL_SOURCE_DATE_EPOCH}" | tee -a setup.log
          uname -a | tee -a setup.log
          echo "" | tee -a setup.log
          echo "===== DISK BEFORE =====" | tee -a setup.log
          df -h | tee -a setup.log

      - name: Free disk space
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "===== FREE DISK SPACE =====" | tee -a setup.log
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android/sdk || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo docker system prune -af || true
          echo "" | tee -a setup.log
          echo "===== DISK AFTER CLEAN =====" | tee -a setup.log
          df -h | tee -a setup.log

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          path: kernel

      - name: Install dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "===== INSTALL DEPENDENCIES =====" | tee -a setup.log
          sudo apt-get update 2>&1 | tee -a setup.log
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            ca-certificates \
            ccache \
            cpio \
            curl \
            dwarves \
            file \
            flex \
            git \
            kmod \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            lz4 \
            make \
            pahole \
            perl \
            python-is-python3 \
            python3 \
            python3-pip \
            rsync \
            unzip \
            xz-utils \
            zip \
            zstd \
            2>&1 | tee -a setup.log

      - name: Verify source tree
        shell: bash
        run: |
          set -Eeuo pipefail
          cd kernel
          echo "===== SOURCE INFO =====" | tee -a ../setup.log
          git remote -v | tee -a ../setup.log
          git rev-parse --short HEAD | tee -a ../setup.log
          git branch --show-current | tee -a ../setup.log || true
          echo "" | tee -a ../setup.log
          echo "===== REQUIRED FILES =====" | tee -a ../setup.log
          test -f Makefile
          test -f "arch/arm64/configs/${DEFCONFIG}"
          echo "OK: arch/arm64/configs/${DEFCONFIG}" | tee -a ../setup.log
          echo "" | tee -a ../setup.log
          echo "===== MAKEFILE VERSION =====" | tee -a ../setup.log
          grep -nE "^(VERSION|PATCHLEVEL|SUBLEVEL|EXTRAVERSION)[[:space:]]*=" Makefile | tee -a ../setup.log || true
          echo "" | tee -a ../setup.log
          echo "===== DEFCONFIG QUICK CHECK =====" | tee -a ../setup.log
          grep -nE "CONFIG_LOCALVERSION|CONFIG_MODULES|CONFIG_BUILD_ARM64_DT_OVERLAY|CONFIG_KSU|CONFIG_KERNELSU|CONFIG_SUSFS|CONFIG_LTO" "arch/arm64/configs/${DEFCONFIG}" | tee -a ../setup.log || true

      - name: Fix KernelSU references
        shell: bash
        run: |
          set -Eeuo pipefail
          cd kernel
          echo "===== FIX KERNELSU REFERENCES =====" | tee -a ../setup.log
          echo "ENABLE_KERNELSU=${ENABLE_KERNELSU}" | tee -a ../setup.log
          echo "KSU_REF=${KSU_REF}" | tee -a ../setup.log
          echo "ENABLE_SUSFS=${ENABLE_SUSFS}" | tee -a ../setup.log
          echo "SUSFS_REF=${SUSFS_REF}" | tee -a ../setup.log
          echo "KSU_VERSION_CODE=${KSU_VERSION_CODE}" | tee -a ../setup.log

          echo "" | tee -a ../setup.log
          echo "===== KERNELSU REFERENCES BEFORE =====" | tee -a ../setup.log
          grep -nE 'kernelsu|CONFIG_KSU|CONFIG_KERNELSU' drivers/Makefile drivers/Kconfig "arch/arm64/configs/${DEFCONFIG}" 2>/dev/null | tee -a ../setup.log || true

          if [ "${ENABLE_KERNELSU}" = "true" ]; then
            echo "KernelSU enabled: installing KernelSU-Next into drivers/kernelsu." | tee -a ../setup.log
            rm -rf KernelSU KernelSU-Next

            # Preferred path: official KernelSU-Next setup script. It creates drivers/kernelsu
            # as a symlink to KernelSU-Next/kernel and injects Makefile/Kconfig lines if needed.
            if curl -fsSL https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/legacy/kernel/setup.sh -o /tmp/ksu-setup.sh; then
              if [ -z "${KSU_REF}" ] || [ "${KSU_REF}" = "latest" ]; then
                sh /tmp/ksu-setup.sh 2>&1 | tee -a ../setup.log || true
              else
                sh /tmp/ksu-setup.sh "${KSU_REF}" 2>&1 | tee -a ../setup.log || true
              fi
            fi

            # Fallback: manual clone/symlink if setup.sh did not produce drivers/kernelsu/Makefile.
            if [ ! -f drivers/kernelsu/Makefile ]; then
              rm -rf drivers/kernelsu KernelSU-Next
              if [ -n "${KSU_REF}" ] && [ "${KSU_REF}" != "latest" ]; then
                git clone --depth=1 --branch "${KSU_REF}" https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next 2>&1 | tee -a ../setup.log \
                  || git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next 2>&1 | tee -a ../setup.log
              else
                git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next 2>&1 | tee -a ../setup.log
              fi
              ln -s ../KernelSU-Next/kernel drivers/kernelsu
            fi

            if [ ! -f drivers/kernelsu/Makefile ]; then
              echo "ERROR: drivers/kernelsu/Makefile still missing after KernelSU setup" | tee -a ../setup.log
              find drivers -maxdepth 2 \( -type d -o -type l \) \( -name '*kernel*' -o -name '*su*' \) | tee -a ../setup.log || true
              exit 1
            fi

            grep -q 'kernelsu' drivers/Makefile || printf '%s\n' 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
            grep -q 'source "drivers/kernelsu/Kconfig"' drivers/Kconfig || sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig

            # This vili kernel tree already contains manual KernelSU hooks in fs/*.c.
            # Use KernelSU-Next manual hook mode. Do NOT force KPROBES hook here.
            if ! grep -q 'config KSU_MANUAL_HOOK' drivers/kernelsu/Kconfig; then
              echo "ERROR: selected KernelSU-Next ref does not provide KSU_MANUAL_HOOK." | tee -a ../setup.log
              echo "Use ksu_ref=legacy for this vili Android 11/5.4 manual-hook kernel." | tee -a ../setup.log
              echo "===== drivers/kernelsu/Kconfig =====" | tee -a ../setup.log
              sed -n '1,260p' drivers/kernelsu/Kconfig | tee -a ../setup.log || true
              exit 1
            fi

            echo "===== FORCE KERNELSU-NEXT VERSION CODE FOR MANAGER COMPAT =====" | tee -a ../setup.log
            for ksu_build_file in drivers/kernelsu/Kbuild drivers/kernelsu/Makefile; do
              if [ -f "$ksu_build_file" ] && ! grep -q 'Vili CI: force KernelSU-Next kernel version' "$ksu_build_file"; then
                {
                  echo ''
                  echo '# Vili CI: force KernelSU-Next kernel version so Manager accepts this built-in kernel.'
                  echo "override KSU_VERSION := ${KSU_VERSION_CODE}"
                  echo '$(info -- Vili forced KernelSU-Next version: $(KSU_VERSION))'
                  echo 'ccflags-y += -DKSU_VERSION=$(KSU_VERSION)'
                } >> "$ksu_build_file"
                echo "Patched $ksu_build_file: forced KSU_VERSION=${KSU_VERSION_CODE}" | tee -a ../setup.log
              fi
            done

            echo "===== PATCH KERNELSU LEGACY MANUAL HOOK MARKER =====" | tee -a ../setup.log
            # KernelSU-Next legacy Kbuild validates manual-hook integration by
            # grepping kernel/reboot.c for ksu_handle_sys_reboot. This source
            # already has the fs hooks, but reboot.c is missing, so Kbuild stops
            # with: No hooks were defined. Patch reboot.c idempotently here.
            python3 - <<'PY_KSU_REBOOT_PATCH' 2>&1 | tee -a ../setup.log
          from pathlib import Path

          p = Path('kernel/reboot.c')
          s = p.read_text()
          orig = s

          extern_block = """#ifdef CONFIG_KSU
          extern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd,
                                           void __user **arg);
          #endif

          """

          if 'ksu_handle_sys_reboot' not in s:
              marker_candidates = [
                  "SYSCALL_DEFINE4(reboot, int, magic1, int, magic2, unsigned int, cmd,\n\t\tvoid __user *, arg)",
                  "SYSCALL_DEFINE4(reboot, int, magic1, int, magic2, unsigned int, cmd, void __user *, arg)",
              ]
              marker = next((m for m in marker_candidates if m in s), None)
              if marker is None:
                  raise SystemExit('ERROR: cannot find SYSCALL_DEFINE4(reboot...) in kernel/reboot.c')

              s = s.replace(marker, extern_block + marker, 1)

              variable_candidates = [
                  "\tstruct pid_namespace *pid_ns = task_active_pid_ns(current);\n\tchar buffer[256];\n\tint ret = 0;\n",
                  " struct pid_namespace *pid_ns = task_active_pid_ns(current); char buffer[256]; int ret = 0; ",
              ]
              old = next((v for v in variable_candidates if v in s), None)
              if old is None:
                  raise SystemExit('ERROR: cannot find local variable block in kernel/reboot.c')

              if '\n' in old:
                  new = old + "\n#ifdef CONFIG_KSU\n\tksu_handle_sys_reboot(magic1, magic2, cmd, &arg);\n#endif\n"
              else:
                  new = old + "\n#ifdef CONFIG_KSU\n\tksu_handle_sys_reboot(magic1, magic2, cmd, &arg);\n#endif\n"
              s = s.replace(old, new, 1)

          if s != orig:
              p.write_text(s)
              print('Patched kernel/reboot.c with ksu_handle_sys_reboot manual hook marker.')
          else:
              print('kernel/reboot.c already has ksu_handle_sys_reboot.')

          print('===== KSU HOOK MARKER CHECK =====')
          for path, token in [
              ('fs/exec.c', 'ksu_handle_execveat'),
              ('fs/open.c', 'ksu_handle_faccessat'),
              ('fs/read_write.c', 'ksu_handle_'),
              ('fs/stat.c', 'ksu_handle_stat'),
              ('kernel/reboot.c', 'ksu_handle_sys_reboot'),
          ]:
              data = Path(path).read_text(errors='ignore')
              print(('OK' if token in data else 'MISSING') + ': ' + path + ' contains ' + token)
          PY_KSU_REBOOT_PATCH

            if ! grep -q 'ksu_handle_sys_reboot' kernel/reboot.c; then
              echo "ERROR: kernel/reboot.c still lacks ksu_handle_sys_reboot after patch" | tee -a ../setup.log
              exit 1
            fi

            echo "===== PREPATCH KERNELSU LEGACY BACKPORTS BEFORE COMPILE =====" | tee -a ../setup.log
            # KernelSU-Next legacy tries to sed-in path_umount/can_umount from
            # drivers/kernelsu/Kbuild. That happens too late: fs/namespace.c may
            # already be compiled, then final LTO fails with undefined path_umount.
            # Patch these helpers before any make compile step so namespace.o
            # actually contains the symbol.
            python3 - <<'PY_KSU_BACKPORTS' 2>&1 | tee -a ../setup.log
          from pathlib import Path

          ns = Path('fs/namespace.c')
          ns_text = ns.read_text()

          anchor = 'static bool is_mnt_ns_file'
          if anchor not in ns_text:
              raise SystemExit('ERROR: cannot find anchor "static bool is_mnt_ns_file" in fs/namespace.c')

          can_umount_code = r'''static int can_umount(const struct path *path, int flags)
          {
          	struct mount *mnt = real_mount(path->mnt);
          
          	if (flags & ~(MNT_FORCE | MNT_DETACH | MNT_EXPIRE | UMOUNT_NOFOLLOW))
          		return -EINVAL;
          	if (!may_mount())
          		return -EPERM;
          	if (path->dentry != path->mnt->mnt_root)
          		return -EINVAL;
          	if (!check_mnt(mnt))
          		return -EINVAL;
          	if (mnt->mnt.mnt_flags & MNT_LOCKED)
          		return -EINVAL;
          	if (flags & MNT_FORCE && !capable(CAP_SYS_ADMIN))
          		return -EPERM;
          
          	return 0;
          }
          
          '''

          path_umount_code = r'''int path_umount(struct path *path, int flags)
          {
          	struct mount *mnt = real_mount(path->mnt);
          	int ret;
          
          	ret = can_umount(path, flags);
          	if (!ret)
          		ret = do_umount(mnt, flags);
          
          	dput(path->dentry);
          	mntput_no_expire(mnt);
          	return ret;
          }
          
          '''

          insert = ''
          if 'static int can_umount(const struct path *path, int flags)' not in ns_text:
              insert += can_umount_code
              print('Prepatched fs/namespace.c: added can_umount().')
          else:
              print('fs/namespace.c already has can_umount().')

          if 'int path_umount(struct path *path, int flags)' not in ns_text:
              insert += path_umount_code
              print('Prepatched fs/namespace.c: added path_umount().')
          else:
              print('fs/namespace.c already has path_umount().')

          if insert:
              ns_text = ns_text.replace(anchor, insert + anchor, 1)
              ns.write_text(ns_text)

          internal = Path('fs/internal.h')
          ih = internal.read_text()
          if 'int path_umount(struct path *path, int flags);' not in ih:
              proto = 'int path_umount(struct path *path, int flags);\n'
              if 'extern void __init mnt_init' in ih:
                  lines = ih.splitlines(True)
                  out_lines = []
                  done = False
                  for line in lines:
                      out_lines.append(line)
                      if not done and 'extern void __init mnt_init' in line:
                          out_lines.append(proto)
                          done = True
                  ih = ''.join(out_lines)
              else:
                  ih += '\n' + proto
              internal.write_text(ih)
              print('Prepatched fs/internal.h: added path_umount prototype.')
          else:
              print('fs/internal.h already has path_umount prototype.')

          seccomp = Path('include/linux/seccomp.h')
          if seccomp.exists():
              sh = seccomp.read_text()
              if 'atomic_t filter_count;' not in sh and 'int mode;' in sh:
                  if '#include <linux/atomic.h>' not in sh:
                      sh = sh.replace('#include <linux/thread_info.h>\n', '#include <linux/thread_info.h>\n#include <linux/atomic.h>\n', 1)
                  sh = sh.replace('int mode;\n', 'int mode;\n\tatomic_t filter_count;\n', 1)
                  seccomp.write_text(sh)
                  print('Prepatched include/linux/seccomp.h: added filter_count.')
              else:
                  print('include/linux/seccomp.h already has filter_count or no standard mode field.')

          final_ns = ns.read_text()
          if 'int path_umount(struct path *path, int flags)' not in final_ns:
              raise SystemExit('ERROR: path_umount still missing after prepatch')
          PY_KSU_BACKPORTS

            if ! grep -q '^int path_umount(struct path \*path, int flags)' fs/namespace.c; then
              echo "ERROR: fs/namespace.c still lacks path_umount after prepatch" | tee -a ../setup.log
              exit 1
            fi

            if [ "${ENABLE_SUSFS}" = "true" ]; then
              echo "===== PORT SUSFS ON TOP OF KSU LEGACY MANUAL-HOOK =====" | tee -a ../setup.log
              echo "Root-first mode: keep KernelSU-Next legacy/manual-hook unchanged; port SuSFS kernel files around it." | tee -a ../setup.log
              rm -rf susfs4ksu

              if ! git clone --depth=1 --branch "${SUSFS_REF}" https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu 2>&1 | tee -a ../setup.log; then
                echo "GitLab clone failed, trying GitHub mirror Star-Seven/susfs4ksu." | tee -a ../setup.log
                git clone --depth=1 https://github.com/Star-Seven/susfs4ksu.git susfs4ksu 2>&1 | tee -a ../setup.log
              fi

              echo "===== SUSFS SOURCE INFO =====" | tee -a ../setup.log
              (cd susfs4ksu && git rev-parse --short HEAD && git branch --show-current || true) 2>&1 | tee -a ../setup.log
              find susfs4ksu/kernel_patches -maxdepth 3 -type f | sort | tee -a ../setup.log

              KERNEL_SUSFS_PATCH="susfs4ksu/kernel_patches/50_add_susfs_in_kernel-5.4.patch"
              if [ ! -f "${KERNEL_SUSFS_PATCH}" ]; then
                echo "ERROR: missing ${KERNEL_SUSFS_PATCH}" | tee -a ../setup.log
                exit 1
              fi

              echo "===== COPY SUSFS SOURCE FILES =====" | tee -a ../setup.log
              if [ -d susfs4ksu/kernel_patches/fs ]; then
                cp -av susfs4ksu/kernel_patches/fs/* fs/ 2>&1 | tee -a ../setup.log
              fi
              if [ -d susfs4ksu/kernel_patches/include/linux ]; then
                cp -av susfs4ksu/kernel_patches/include/linux/* include/linux/ 2>&1 | tee -a ../setup.log
              fi

              echo "===== PATCH KERNEL TREE WITH SUSFS 5.4 PATCH INCLUDING NAMESPACE, MANUAL MOUNT.H, PROC STILL FILTERED =====" | tee -a ../setup.log
              rm -f /tmp/susfs_kernel_filtered.patch /tmp/susfs_kernel_patch.log
              find . -name '*.rej' -o -name '*.orig' | xargs -r rm -f
              python3 - "${KERNEL_SUSFS_PATCH}" /tmp/susfs_kernel_filtered.patch <<'PY_FILTER_SUSFS_PATCH' 2>&1 | tee -a ../setup.log
          from pathlib import Path
          import sys

          src = Path(sys.argv[1])
          dst = Path(sys.argv[2])
          skip = {
              'fs/proc/bootconfig.c',
              'fs/proc/fd.c',
              'fs/proc/task_mmu.c',
              'fs/proc/task_nommu.c',
              # v15: patch include/linux/mount.h manually because the upstream KABI hunk fails on vili.
              'include/linux/mount.h',
          }
          out = []
          keep = True
          skipped = []
          for line in src.read_text(errors='ignore').splitlines(True):
              if line.startswith('diff --git a/'):
                  parts = line.split()
                  path = ''
                  if len(parts) >= 3 and parts[2].startswith('a/'):
                      path = parts[2][2:]
                  keep = path not in skip
                  if not keep:
                      skipped.append(path)
              if keep:
                  out.append(line)
          dst.write_text(''.join(out))
          print('Filtered SuSFS kernel patch written:', dst)
          print('Skipped file hunks:', ', '.join(skipped) if skipped else '(none)')
          PY_FILTER_SUSFS_PATCH

              if patch -p1 --forward --dry-run < /tmp/susfs_kernel_filtered.patch >/tmp/susfs_kernel_patch.log 2>&1; then
                cat /tmp/susfs_kernel_patch.log | tee -a ../setup.log
                patch -p1 --forward < /tmp/susfs_kernel_filtered.patch 2>&1 | tee -a ../setup.log
              else
                echo "ERROR: SuSFS namespace port patch fails dry-run. fs/namespace.c needs manual porting before SUS_MOUNT can be enabled." | tee -a ../setup.log
                echo "===== PATCH DRY-RUN LOG =====" | tee -a ../setup.log
                cat /tmp/susfs_kernel_patch.log | tee -a ../setup.log || true
                echo "===== RELEVANT CONTEXT =====" | tee -a ../setup.log
                grep -Rns "susfs\|struct mount\|mnt_id\|path_umount\|can_umount" fs/namespace.c include/linux/mount.h fs/proc_namespace.c 2>/dev/null | head -220 | tee -a ../setup.log || true
                exit 1
              fi


              echo "===== MANUAL PORT include/linux/mount.h SUSFS KABI FIELD =====" | tee -a ../setup.log
              python3 - <<'PY_MANUAL_MOUNT_H' 2>&1 | tee -a ../setup.log
          from pathlib import Path
          import re

          path = Path('include/linux/mount.h')
          s = path.read_text(errors='ignore')
          if 'susfs_mnt_id_backup' in s:
              print('include/linux/mount.h already has susfs_mnt_id_backup')
          else:
              block = '#ifdef CONFIG_KSU_SUSFS\n\tANDROID_KABI_USE(4, u64 susfs_mnt_id_backup);\n#else\n\tANDROID_KABI_RESERVE(4);\n#endif'
              if 'ANDROID_KABI_RESERVE(4);' in s:
                  s = s.replace('ANDROID_KABI_RESERVE(4);', block, 1)
                  path.write_text(s)
                  print('Patched include/linux/mount.h: replaced ANDROID_KABI_RESERVE(4) with susfs_mnt_id_backup KABI field')
              else:
                  m = re.search(r'(struct\s+vfsmount\s*\{[\s\S]*?)(\}\s*__randomize_layout\s*;)', s)
                  if not m:
                      raise SystemExit('ERROR: could not locate struct vfsmount end in include/linux/mount.h')
                  fallback = '\n#ifdef CONFIG_KSU_SUSFS\n\tu64 susfs_mnt_id_backup;\n#endif\n'
                  s = s[:m.end(1)] + fallback + s[m.start(2):]
                  path.write_text(s)
                  print('Patched include/linux/mount.h: inserted plain susfs_mnt_id_backup field before __randomize_layout')

          s = path.read_text(errors='ignore')
          if 'susfs_mnt_id_backup' not in s:
              raise SystemExit('ERROR: include/linux/mount.h manual patch did not add susfs_mnt_id_backup')
          PY_MANUAL_MOUNT_H

              echo "===== NAMESPACE/MOUNT PORT CHECK =====" | tee -a ../setup.log
