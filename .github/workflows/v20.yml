          #ifdef CMD_SUSFS_SUS_SU
                  case CMD_SUSFS_SUS_SU:
          #ifdef CONFIG_KSU_SUSFS_SUS_SU
                          return susfs_sus_su((struct st_sus_su __user *)arg3);
          #else
                          return -EOPNOTSUPP;
