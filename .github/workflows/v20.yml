                  "#ifndef EOPNOTSUPP\n"
                  "#define EOPNOTSUPP 95\n"
                  "#endif\n"
                  "#ifndef KERNEL_SU_OPTION\n"
                  "#define KERNEL_SU_OPTION 0xDEADBEEF\n"
                  "#endif\n"
                  "extern int ksu_vili_handle_susfs_prctl(unsigned long cmd, unsigned long arg3,\n"
                  "                                       unsigned long arg4, unsigned long arg5);\n"
                  "#endif\n")
          if 'ksu_vili_handle_susfs_prctl' not in s:
              include_matches = list(re.finditer(r'^#include[^\n]+\n', s, flags=re.M))
              if include_matches:
                  pos = include_matches[-1].end()
                  s = s[:pos] + decl + s[pos:]
              else:
                  s = decl + s

          bridge_call = ("\n#ifdef CONFIG_KSU_SUSFS\n"
                  "\t/* Vili CI: direct SuSFS prctl bridge level 3 try_umount debug v8 v8.\n"
                  "\t * KernelSU-Next legacy root path stays untouched; this only services\n"
                  "\t * root-owned ksu_susfs userspace commands using prctl(0xDEADBEEF, ...).\n"
                  "\t */\n"
                  "\tif (option == KERNEL_SU_OPTION) {\n"
                  "\t\tif (current_uid().val != 0)\n"
                  "\t\t\treturn -EPERM;\n"
                  "\t\t{\n"
                  "\t\t\tint vili_susfs_ret = ksu_vili_handle_susfs_prctl(arg2, arg3, arg4, arg5);\n"
                  "\t\t\tif (vili_susfs_ret != -EOPNOTSUPP)\n"
                  "\t\t\t\treturn vili_susfs_ret;\n"
                  "\t\t}\n"
                  "\t}\n"
                  "#endif\n")


