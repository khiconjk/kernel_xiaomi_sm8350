              # clang expands the declaration itself and reports a conflicting type.
              # Remove the stale extern first, then install the compat wrapper.
              s = re.sub(r'^\s*extern\s+void\s+ksu_try_umount\s*\([^;]*\);\s*\n', '', s, flags=re.M)
              block = '\n/* Vili CI: ksu_try_umount compat for legacy KernelSU.\n * SuSFS kernel-5.4 calls ksu_try_umount(), but KernelSU-Next legacy\n * used on vili does not expose that helper. Keep TRY_UMOUNT buildable\n * by routing the requested path to the kernel\'s internal path_umount().\n */\n#ifndef VILI_KSU_TRY_UMOUNT_COMPAT\n#define VILI_KSU_TRY_UMOUNT_COMPAT\n#include <linux/namei.h>\n#include <linux/types.h>\n#include "internal.h"\nstatic void vili_ksu_try_umount_compat(const char *target, bool check_mnt,\n                                       int flags, uid_t target_uid)\n{\n        struct path path;\n\n        (void)check_mnt;\n        (void)target_uid;\n\n        if (!target || !target[0])\n                return;\n\n        if (kern_path(target, LOOKUP_FOLLOW, &path))\n                return;\n\n        path_umount(&path, flags);\n        path_put(&path);\n}\n#define ksu_try_umount(_target, _check_mnt, _flags, _target_uid)         vili_ksu_try_umount_compat((_target), (_check_mnt), (_flags), (_target_uid))\n#endif\n'
              # Put the compat block after the include section so types/macros exist,
              # while still before susfs_try_umount() calls ksu_try_umount().
              incs = list(re.finditer(r'^#include[^\n]+\n', s, flags=re.M))
              if incs:
                  pos = incs[-1].end()
                  s = s[:pos] + block + '\n' + s[pos:]
              else:
                  s = block + '\n' + s

          if s != orig:
              p.write_text(s)
              print('Patched fs/susfs.c with vili_ksu_try_umount_compat().')
          else:
              print('fs/susfs.c already has ksu_try_umount compat or no ksu_try_umount call found.')

          final = p.read_text(errors='ignore')
          if 'ksu_try_umount(' in final and 'vili_ksu_try_umount_compat' not in final:
              raise SystemExit('ERROR: ksu_try_umount compat verification failed')
          if re.search(r'^\s*extern\s+void\s+ksu_try_umount\s*\(', final, flags=re.M):
